sensor:
- name: "Heating Preheat Offset Dynamic Uncapped"
  unit_of_measurement: "K"
  availability: >
    {% set rooms = states.input_number
        | selectattr('entity_id', 'search', '^input_number.heating_base_')
        | map(attribute='state') | list %}
    {{ states('sensor.H_kW_per_K_effective') | is_number
       and states('input_number.building_heat_capacity') | is_number
       and states('sensor.outside_temperature') | is_number
       and states('sensor.solar_gains_average') | is_number
       and states('sensor.internal_gains_average') | is_number
       and (rooms | count > 0)
       and (rooms | select('is_number') | list | count == rooms | count) }}
  state: >
    {% set h_wind = states('sensor.H_kW_per_K_effective') | float %}
    {% set c_real = states('input_number.building_heat_capacity') | float %}
    {% set rooms = states.input_number 
                | selectattr('entity_id', 'search', '^input_number.heating_base_') 
                | map(attribute='state') | map('float') | list %}
    {% set delta_t = ((rooms | sum / rooms | count) | round(2) if rooms | count > 0 else 0) - (states('sensor.outside_temperature') | float) %}
    {% set hours_to_bridge = 24 - 5 %}
    {% set total_energy_loss = h_wind * delta_t * hours_to_bridge %}
    {% set solar_gains = states('sensor.solar_gains_average') | float %}
    {% set internal_gains = states('sensor.internal_gains_average') | float %}
    {% set total_gains = ((solar_gains + internal_gains) * hours_to_bridge) / 1000 %}
    {% set needed_offset = ((total_energy_loss - total_gains) / c_real) %}
    {{ needed_offset | round(1) }}
  attributes:
    solar_gains: "{{ states('sensor.solar_gains_average') }}"
    internal_gains: "{{ states('sensor.internal_gains_average') }}"
    gains: "{{ ((states('sensor.solar_gains_average') | float(0)) + (states('sensor.internal_gains_average') | float(0))) * 16 }}"
- name: "Heating Preheat Offset Dynamic"
  unit_of_measurement: "K"
  availability: >
    {{ states('sensor.heating_preheat_offset_dynamic_uncapped') | is_number
       and states('input_number.heating_max_offset_k') | is_number }}
  state: >
    {% set uncapped = states('sensor.heating_preheat_offset_dynamic_uncapped') | float %}
    {% set max_offset = states('input_number.heating_max_offset_k') | float %}
    {% if uncapped > max_offset %}
      {{ max_offset }}
    {% elif uncapped < 0 %}
      0
    {% else %}
      {{ uncapped }}
    {% endif %}
